name: FitForge
options:
  bundleIdPrefix: com.fitforge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"

targets:
  FitForge:
    type: application
    platform: iOS
    sources:
      - path: FitForge
    resources:
      - path: FitForge/Resources
    settings:
      base:
        INFOPLIST_FILE: FitForge/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fitforge.app
        PRODUCT_NAME: FitForge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Lottie
    entitlements:
      path: FitForge/FitForge.entitlements
      properties:
        com.apple.developer.musickit: true

  FitForgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FitForgeTests
    dependencies:
      - target: FitForge
