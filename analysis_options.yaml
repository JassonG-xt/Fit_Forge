# ════════════════════════════════════════════════════════════════════
#  FitForge static analysis configuration
# ════════════════════════════════════════════════════════════════════
#  - Based on `flutter_lints` for Flutter-specific recommendations
#  - Adds strict analyzer modes to catch type weakness early
#  - Adds ~20 opinionated lint rules covering correctness / style / perf
#
#  Violations block CI (`flutter analyze --fatal-infos --fatal-warnings`).
#  See CONTRIBUTING.md for rationale.
# ════════════════════════════════════════════════════════════════════

include: package:flutter_lints/flutter.yaml

analyzer:
  # ─── Strict type checking ───
  # strict-casts: forbid implicit downcasts (e.g., dynamic → String)
  # strict-inference: error when Dart can't infer and defaults to dynamic
  # strict-raw-types: flag usage of raw generics like `List` instead of `List<T>`
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  # ─── Error severity tweaks ───
  errors:
    # freezed annotation target is valid but triggers this lint on abstract classes
    invalid_annotation_target: ignore
    # TODO comments are tracked in issues; don't block analyze
    todo: ignore

  # ─── Paths excluded from analysis ───
  exclude:
    - "**/*.g.dart"              # json_serializable / built_value generated
    - "**/*.freezed.dart"        # freezed generated
    - "lib/l10n/**"              # intl auto-generated from arb
    - "build/**"
    - ".dart_tool/**"

linter:
  rules:
    # ══════════════════════════════════════════════════════
    #  Correctness / bug prevention
    # ══════════════════════════════════════════════════════

    # Prevent using BuildContext after an async gap without mounted check.
    # Flutter 3.x default, but enforced explicitly for clarity.
    - use_build_context_synchronously

    # Ban `print()` in production code; use `debugPrint` or a logger.
    - avoid_print

    # Require `await` or explicit `unawaited(...)` for every Future.
    - unawaited_futures

    # Every function must declare its return type.
    - always_declare_return_types

    # Type annotations for public API.
    - type_annotate_public_apis

    # Ban calling methods on `dynamic` without opting in explicitly.
    - avoid_dynamic_calls

    # Prevent silent exception swallowing.
    - empty_catches

    # Empty else { } is almost always a bug.
    - avoid_empty_else

    # ══════════════════════════════════════════════════════
    #  Style / consistency
    # ══════════════════════════════════════════════════════

    # Prefer const constructors when arguments are const.
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables

    # Single quotes are the project convention.
    - prefer_single_quotes

    # Trailing commas make widget trees diff-friendly.
    - require_trailing_commas

    # `child:` / `children:` should be the last parameter in Flutter widgets.
    - sort_child_properties_last

    # Constructors come before methods.
    - sort_constructors_first

    # Prefer final when the variable is never reassigned.
    - prefer_final_locals
    - prefer_final_in_for_each

    # ══════════════════════════════════════════════════════
    #  Performance / Flutter idioms
    # ══════════════════════════════════════════════════════

    # Container() without decoration/padding/alignment is redundant.
    - avoid_unnecessary_containers

    # Use SizedBox for pure whitespace (const-friendly, lighter).
    - sized_box_for_whitespace
    - sized_box_shrink_expand

    # Use is! instead of negated is checks.
    - prefer_is_not_operator

    # Use collection literals instead of constructors.
    - prefer_collection_literals
