name: Deploy Web Demo

# Triggers:
#  - push to main (auto-deploy)
#  - manual dispatch from Actions tab
on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # base-href must match the GitHub Pages URL path EXACTLY (case-sensitive).
      # Repo is `Fit_Forge` so URL is JassonG-xt.github.io/Fit_Forge/
      # For a custom domain (CNAME) change to "/"
      - name: Build web
        run: flutter build web --release --base-href "/Fit_Forge/"

      - name: Configure SPA fallback
        run: cp build/web/index.html build/web/404.html

      - name: Verify Pages artifact
        run: |
          test -f build/web/index.html
          test -f build/web/404.html
          grep -Fq '<base href="/Fit_Forge/">' build/web/index.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
