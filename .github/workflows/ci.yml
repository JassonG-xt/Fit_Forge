name: CI

# Run on every push to main and every PR.
# PRs from forks run without access to secrets — only analyze/test, no release builds.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Only run the latest commit's workflow; cancel older ones still in progress.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # Uncomment after Sprint 2 (freezed refactor) lands:
      # - name: Generate code (freezed / json_serializable)
      #   run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting (PR only)
        if: github.event_name == 'pull_request'
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
