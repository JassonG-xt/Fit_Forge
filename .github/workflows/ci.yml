name: CI

# Run on every push to main and every PR.
# PRs from forks run without access to secrets — only analyze/test, no release builds.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Only run the latest commit's workflow; cancel older ones still in progress.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # Uncomment after Sprint 2 (freezed refactor) lands:
      # - name: Generate code (freezed / json_serializable)
      #   run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Enforce coverage thresholds
        run: |
          python3 - <<'PY'
          from pathlib import Path

          total_lf = total_lh = core_lf = core_lh = 0
          current_sf = ""
          for line in Path("coverage/lcov.info").read_text().splitlines():
              if line.startswith("SF:"):
                  current_sf = line[3:].replace("\\", "/")
              elif line.startswith("LF:"):
                  value = int(line[3:])
                  total_lf += value
                  if current_sf.startswith(("lib/engines/", "lib/services/")):
                      core_lf += value
              elif line.startswith("LH:"):
                  value = int(line[3:])
                  total_lh += value
                  if current_sf.startswith(("lib/engines/", "lib/services/")):
                      core_lh += value

          total = total_lh / total_lf if total_lf else 0
          core = core_lh / core_lf if core_lf else 0
          print(f"Total coverage: {total:.2%}")
          print(f"Core engine/service coverage: {core:.2%}")
          if total < 0.75:
              raise SystemExit("Total coverage must be at least 75%")
          if core < 0.90:
              raise SystemExit("Core engine/service coverage must be at least 90%")
          PY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
