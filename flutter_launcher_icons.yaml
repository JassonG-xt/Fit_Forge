flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"

  # ──── Android ────
  android: "launcher_icon"
  min_sdk_android: 21
  # Android 8+ adaptive icon：背景 = 深色 scaffold，前景 = 主图
  adaptive_icon_background: "#0A0B0F"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  # Android 13+ themed icon（monochrome）复用同一张图
  adaptive_icon_monochrome: "assets/icon/app_icon.png"

  # ──── iOS（v2 预留） ────
  # iOS 不支持透明 alpha，生成时自动填背景
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#0A0B0F"

  # ──── Web ────
  # 生成 web/favicon.png + web/icons/Icon-{192,512}.png + maskable 变体
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0A0B0F"
    theme_color: "#FF6B1A"

  # ──── Windows / macOS（本期不做） ────
  windows:
    generate: false
  macos:
    generate: false
