<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/Fit_Forge/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FitForge — 开源、离线优先的智能健身 App。根据身体数据自动生成 7 天训练与营养计划。An open-source, offline-first AI personal trainer with auto-generated workouts and nutrition plans.">
  <meta name="theme-color" content="#FF6B1A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FitForge">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Open Graph / Facebook / WeChat / LinkedIn social card -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="FitForge">
  <meta property="og:title" content="FitForge — 智能健身 App">
  <meta property="og:description" content="开源、离线优先的智能健身助手。根据身体数据自动生成 7 天训练与营养计划。Open-source, offline-first AI personal trainer.">
  <meta property="og:image" content="https://JassonG-xt.github.io/Fit_Forge/icons/Icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="FitForge logo — glowing barbell and flame on dark background">
  <meta property="og:url" content="https://JassonG-xt.github.io/Fit_Forge/">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:locale:alternate" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FitForge — 智能健身 App">
  <meta name="twitter:description" content="开源、离线优先的智能健身助手，自动生成训练与营养计划。Open-source AI personal trainer.">
  <meta name="twitter:image" content="https://JassonG-xt.github.io/Fit_Forge/icons/Icon-512.png">
  <meta name="twitter:image:alt" content="FitForge logo — glowing barbell and flame on dark background">

  <title>FitForge — 智能健身 App</title>
  <link rel="manifest" href="manifest.json">

  <!--
    First-screen brand spinner.
    Flutter Web has a 2-5s cold-start on slow networks while the engine bundle
    downloads. Without this overlay users see a blank white page and often
    bounce. The overlay matches `flutter_native_splash.yaml` colors so mobile
    and web feel identical. It is removed by `flutter_bootstrap.js` once the
    first Flutter frame paints.
  -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0B0F;
    }

    #loading-indicator {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A0B0F;
      z-index: 2147483647;
      transition: opacity 420ms ease-out;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }

    #loading-indicator.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .fit-forge-spinner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid rgba(255, 107, 26, 0.16);
      border-top-color: #FF6B1A;
      box-shadow: 0 0 24px rgba(255, 107, 26, 0.35);
      animation: fit-forge-spin 0.9s linear infinite;
    }

    .fit-forge-wordmark {
      margin-top: 22px;
      color: #FF6B1A;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-shadow: 0 0 14px rgba(255, 107, 26, 0.45);
    }

    .fit-forge-tagline {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.42);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    @keyframes fit-forge-spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .fit-forge-spinner {
        animation-duration: 2.4s;
      }
    }
  </style>
</head>
<body>
  <div id="loading-indicator" role="status" aria-live="polite" aria-label="Loading FitForge">
    <div class="fit-forge-spinner" aria-hidden="true"></div>
    <div class="fit-forge-wordmark">FITFORGE</div>
    <div class="fit-forge-tagline">智能健身 · Loading…</div>
  </div>

  <!--
    `flutter_bootstrap.js` is a custom loader at web/flutter_bootstrap.js that
    hides #loading-indicator once the first Flutter frame has rendered. If the
    file is absent, `flutter build web` generates a default one that simply
    runs the app without touching the spinner.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
