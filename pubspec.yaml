name: fit_forge
description: "FitForge — 智能健身 App。根据用户画像自动生成训练和营养计划。AI-powered personal trainer with auto-generated workout and nutrition plans."
publish_to: 'none'
version: 1.0.0+1

homepage: https://github.com/JassonG-xt/Fit_Forge
repository: https://github.com/JassonG-xt/Fit_Forge
issue_tracker: https://github.com/JassonG-xt/Fit_Forge/issues
documentation: https://github.com/JassonG-xt/Fit_Forge#readme

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.2

  # 本地存储
  shared_preferences: ^2.3.3

  # 图表
  fl_chart: ^0.69.0

  # 动画（Lottie）
  lottie: ^3.1.2

  # 音频播放
  # (reserved for future real audio implementation)

  # 通知 (reserved for future implementation)
  # flutter_local_notifications: ^17.2.3
  # timezone: ^0.9.4

  # 字体
  google_fonts: ^6.2.1

  # 工具
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
