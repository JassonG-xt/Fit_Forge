name: fit_forge
description: "FitForge - 智能健身 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.2

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # 图表
  fl_chart: ^0.69.0

  # 动画（Lottie）
  lottie: ^3.1.2

  # 音频播放
  just_audio: ^0.9.40
  audioplayers: ^6.1.0

  # 通知
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # 工具
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/animations/
